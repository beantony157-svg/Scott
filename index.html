<title>Algebraic Identities — Chapter 3</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f7f5;color:#1a1a2e;min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

/* ── HOME ── */
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;text-align:center}
.home-tag{font-size:11px;font-weight:700;letter-spacing:.12em;color:#534AB7;text-transform:uppercase;margin-bottom:12px}
.home-h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);color:#1a1a2e;margin-bottom:12px}
.home-sub{font-size:15px;color:#778;max-width:480px;margin:0 auto 2.5rem;line-height:1.6}
.ch-list{display:flex;flex-direction:column;gap:14px;width:100%;max-width:560px}
.ch-card{background:#fff;border:1.5px solid #e5e5e8;border-radius:18px;padding:1.4rem 1.6rem;display:flex;align-items:center;justify-content:space-between;gap:16px;text-align:left;box-shadow:0 2px 12px rgba(0,0,0,.04);transition:box-shadow .2s,transform .15s}
.ch-card:hover{box-shadow:0 6px 28px rgba(83,74,183,.13);transform:translateY(-1px)}
.ch-card:active{transform:scale(.98)}
.ch-tag{font-size:11px;font-weight:700;letter-spacing:.1em;color:#534AB7;text-transform:uppercase;margin-bottom:6px}
.ch-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a1a2e;margin-bottom:4px;line-height:1.3}
.ch-sub{font-size:13px;color:#888}
.ch-arrow{background:#EEEDFE;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#534AB7;flex-shrink:0}

/* ── LESSON SHELL ── */
#lesson{display:none;flex-direction:column;min-height:100vh}
.top-bar{position:sticky;top:0;z-index:40;background:rgba(247,247,245,.92);backdrop-filter:blur(14px);border-bottom:1px solid #e5e5e8}
.top-inner{max-width:720px;margin:0 auto;padding:0 16px}
.chip-row{display:flex;align-items:center;gap:10px;height:48px;overflow-x:auto;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.back-btn{background:none;border:none;font-size:18px;color:#534AB7;padding:4px 8px;border-radius:8px;flex-shrink:0}
.fchip{background:#fff;border:1.5px solid #e5e5e8;border-radius:20px;padding:4px 12px;font-size:12px;color:#666;white-space:nowrap;flex-shrink:0;transition:all .2s}
.fchip.on{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489;font-weight:700}
.dot-row{display:flex;gap:6px;padding-bottom:10px;align-items:center}
.pdot{height:9px;border-radius:5px;border:none;background:#d4d4d8;padding:0;transition:all .25s;cursor:pointer}
.pdot.active{background:#534AB7;width:24px}
.pdot.done{background:#534AB7;opacity:.4}
.pdot.sum{background:#d4d4d8}
.pdot.sum.active{background:#5DCAA5;width:24px}
.pdot.sum.done{background:#5DCAA5;opacity:.5}

/* ── CARD ── */
.content{max-width:720px;margin:0 auto;padding:24px 16px 80px}
.card{display:none}
.card.active{display:block}

/* lesson header */
.lhdr{display:flex;gap:16px;align-items:flex-start;margin-bottom:22px}
.lnum{width:52px;height:52px;border-radius:50%;background:#EEEDFE;border:2px solid #AFA9EC;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#534AB7;flex-shrink:0}
.ltitle{font-family:'Playfair Display',serif;font-size:clamp(1.25rem,3vw,1.7rem);font-weight:700;color:#1a1a2e;margin-bottom:6px}
.lconcept{font-size:14px;color:#667;line-height:1.6}

/* formula boxes */
.fbox{border-radius:12px;padding:14px 18px;margin-bottom:10px}
.fbox .flbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.fbox .ftext{font-family:monospace;font-size:15px;font-weight:700;margin-bottom:4px}
.fbox .fmean{font-size:12px}
.fbox-0{background:#EEEDFE;border:1.5px solid #AFA9EC;border-left:5px solid #AFA9EC}
.fbox-0 .flbl,.fbox-0 .fmean{color:#534AB7}.fbox-0 .ftext{color:#3C3489}
.fbox-1{background:#FAEEDA;border:1.5px solid #EF9F27;border-left:5px solid #EF9F27}
.fbox-1 .flbl,.fbox-1 .fmean{color:#854F0B}.fbox-1 .ftext{color:#633806}
.fbox-2{background:#E1F5EE;border:1.5px solid #5DCAA5;border-left:5px solid #5DCAA5}
.fbox-2 .flbl,.fbox-2 .fmean{color:#0F6E56}.fbox-2 .ftext{color:#085041}
.fbox-3{background:#FAECE7;border:1.5px solid #F0997B;border-left:5px solid #F0997B}
.fbox-3 .flbl,.fbox-3 .fmean{color:#993C1D}.fbox-3 .ftext{color:#712B13}
.fbox-4{background:#E6F1FB;border:1.5px solid #85B7EB;border-left:5px solid #85B7EB}
.fbox-4 .flbl,.fbox-4 .fmean{color:#185FA5}.fbox-4 .ftext{color:#0C447C}

/* visual */
.vis{margin:18px 0;overflow-x:auto}
.vis svg{max-width:100%;height:auto}

/* worked example */
.ex-box{background:#fff;border:1.5px solid #e5e5e8;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ex-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:#534AB7;text-transform:uppercase;margin-bottom:10px}
.ex-q{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:14px}
.step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;opacity:0;transform:translateX(-12px);transition:opacity .3s,transform .3s}
.step.vis2{opacity:1;transform:none}
.sarr{color:#AFA9EC;font-size:14px;font-weight:700;margin-top:1px;flex-shrink:0;width:16px}
.stxt{font-family:monospace;font-size:14px;color:#333;line-height:1.5}
.abadge{display:inline-block;background:#EEEDFE;color:#3C3489;border:1.5px solid #AFA9EC;border-radius:20px;padding:6px 16px;font-size:14px;font-weight:700;font-family:monospace}

/* practice questions */
.qlbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:#667;text-transform:uppercase;margin-bottom:12px}
.qi{border:1.5px solid #e8e8ec;border-radius:12px;overflow:hidden;margin-bottom:10px}
.qh{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border:none;width:100%;text-align:left;cursor:pointer;transition:background .15s}
.qh:hover{background:#fafaf8}
.qi.open .qh{background:#f7f6ff}
.qn{background:#EEEDFE;color:#534AB7;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.qtxt{flex:1;font-size:14px;color:#333;font-weight:500}
.qtog{font-size:18px;color:#888;transition:transform .2s}
.qi.open .qtog{transform:rotate(180deg)}
.qb{max-height:0;overflow:hidden;transition:max-height .28s ease}
.qi.open .qb{max-height:600px}
.qb-inner{padding:12px 16px 16px;background:#fafaf8;border-top:1px solid #eee}
.qhint{background:#FAEEDA;border-left:3px solid #EF9F27;padding:8px 12px;border-radius:8px;font-size:13px;color:#633806;margin-bottom:12px}
.qstep{display:flex;gap:10px;margin-bottom:6px}
.qsn{color:#888;font-size:12px;font-weight:700;margin-top:1px;flex-shrink:0}
.qst{font-family:monospace;font-size:13px;color:#333}
.qans{display:inline-block;background:#E1F5EE;color:#085041;border:1.5px solid #5DCAA5;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;margin-top:6px}

/* nav */
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:8px;flex-wrap:wrap}
.nbtn{border:1.5px solid #e5e5e8;background:#fff;border-radius:28px;padding:12px 24px;font-size:15px;color:#333;font-weight:500;transition:all .15s}
.nbtn:hover{background:#f5f5f5}
.nbtn:disabled{opacity:.4;cursor:not-allowed}
.nbtn.pri{background:#534AB7;border-color:#534AB7;color:#fff;font-weight:600}
.nbtn.pri:hover{background:#3C3489}

/* summary */
.sum{text-align:center;margin-bottom:32px}
.sum-ico{width:72px;height:72px;border-radius:50%;background:#E1F5EE;border:2px solid #5DCAA5;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px}
.sum h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a1a2e;margin-bottom:8px}
.sum p{color:#667;font-size:15px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin:24px 0 32px;text-align:left}
.fsc{background:#fff;border:1.5px solid #e5e5e8;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.fn{font-size:11px;font-weight:700;color:#534AB7;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.ff{font-family:monospace;font-size:13px;color:#333}
.sum-nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

@media(max-width:480px){
  .lhdr{gap:10px}
  .lnum{width:42px;height:42px;font-size:15px}
  .ltitle{font-size:1.1rem}
}
</style>
</head>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const CHAPTERS = [
{
  tag:"Chapter 3.1", title:"Algebraic Identities & Their Applications",
  chips:["(a+b)²","(a−b)²","(a+b+c)²","a²−b²","ab as □−□","(a+b)²=(a−b)²+4ab"],
  summary:[
    {n:"(a+b)²",f:"a² + 2ab + b²"},{n:"(a−b)²",f:"a² − 2ab + b²"},
    {n:"(a+b+c)²",f:"a²+b²+c²+2ab+2bc+2ca"},{n:"a²−b²",f:"(a+b)(a−b)"},
    {n:"(a+b)² corollary",f:"(a−b)² + 4ab"},{n:"a²+b²+c²",f:"(a+b+c)² − 2(ab+bc+ca)"},
    {n:"ab as □−□",f:"((a+b)/2)² − ((a−b)/2)²"},{n:"a⁴+a²b²+b⁴",f:"(a²+ab+b²)(a²−ab+b²)"},
  ],
  lessons:[
    {num:"01",title:"Square of a Binomial",concept:"When we square two terms together, we multiply the expression by itself. That creates the square of the first term, two middle product terms, and the square of the second term.",
    formulas:["(a + b)² = a² + 2ab + b²","(a − b)² = a² − 2ab + b²"],meanings:["Square of first + twice product + square of second","Square of first − twice product + square of second"],
    vis:"binomial",
    ex:{q:"Expand (a + b)²",steps:["(a + b)² = (a + b)(a + b)","= a·a + a·b + b·a + b·b","= a² + ab + ab + b²","= a² + 2ab + b²"],ans:"a² + 2ab + b²"},
    qs:[
      {q:"Square of (4x + 5y)?",h:"Use (a+b)²: a = 4x, b = 5y",s:["(4x+5y)² = (4x)² + 2×(4x)×(5y) + (5y)²","= 16x² + 40xy + 25y²"],a:"16x² + 40xy + 25y²"},
      {q:"Square of (3a − 7b)?",h:"Use (a−b)²: a = 3a, b = 7b",s:["(3a−7b)² = (3a)² − 2×(3a)×(7b) + (7b)²","= 9a² − 42ab + 49b²"],a:"9a² − 42ab + 49b²"},
      {q:"Square of (2a + 3b)?",h:"Direct use of (a+b)²",s:["(2a+3b)² = (2a)² + 2×(2a)×(3b) + (3b)²","= 4a² + 12ab + 9b²"],a:"4a² + 12ab + 9b²"},
      {q:"Square of (x² + 2/y²)?",h:"Treat x² as one term, 2/y² as the other",s:["= (x²)² + 2×(x²)×(2/y²) + (2/y²)²","= x⁴ + 4x²/y² + 4/y⁴"],a:"x⁴ + 4x²/y² + 4/y⁴"},
      {q:"Square of (4y − 5x)?",h:"Use (a−b)²",s:["(4y−5x)² = (4y)² − 2×(4y)×(5x) + (5x)²","= 16y² − 40xy + 25x²"],a:"16y² − 40xy + 25x²"},
      {q:"Square of (5x² − y)?",h:"Treat 5x² as first term, y as second",s:["(5x²−y)² = (5x²)² − 2×(5x²)×(y) + (y)²","= 25x⁴ − 10x²y + y²"],a:"25x⁴ − 10x²y + y²"}
    ]},
    {num:"02",title:"Square of Three or More Terms",concept:"When there are three or more terms, square each term and add twice the product of every pair of different terms.",
    formulas:["(a+b+c)² = a²+b²+c²+2ab+2bc+2ca","(a+b+c+d)² = a²+b²+c²+d²+2ab+2ac+2ad+2bc+2bd+2cd"],meanings:["Square each, add twice every pair","Square each of four, add twice every pair"],
    vis:"trinomial",
    ex:{q:"Expand (a + b + c)²",steps:["Think: square each term, add twice each pair","= a² + b² + c² + 2ab + 2bc + 2ca"],ans:"a² + b² + c² + 2ab + 2bc + 2ca"},
    qs:[
      {q:"Square of (a + b + c + d)?",h:"Group as (a+b) + (c+d), then expand",s:["= {(a+b)+(c+d)}²","= (a+b)² + 2(a+b)(c+d) + (c+d)²","= a²+2ab+b² + 2(ac+ad+bc+bd) + c²+2cd+d²","= a²+b²+c²+d²+2ab+2ac+2ad+2bc+2bd+2cd"],a:"a²+b²+c²+d²+2ab+2ac+2ad+2bc+2bd+2cd"},
      {q:"Square of (3b − 5c − 2a)?",h:"Three terms: 3b, −5c, −2a. Apply trinomial formula.",s:["= (3b)²+(−5c)²+(−2a)²+2(3b)(−5c)+2(−5c)(−2a)+2(3b)(−2a)","= 9b²+25c²+4a²−30bc+20ac−12ab"],a:"9b²+25c²+4a²−30bc+20ac−12ab"},
      {q:"Square of (ax − by − cz)?",h:"Treat ax, −by, −cz as three terms",s:["= (ax)²+(−by)²+(−cz)²+2(ax)(−by)+2(−by)(−cz)+2(ax)(−cz)","= a²x²+b²y²+c²z²−2abxy+2bcyz−2acxz"],a:"a²x²+b²y²+c²z²−2abxy+2bcyz−2acxz"},
      {q:"Square of (2a + 3x − 2y − 5z)?",h:"Group as (2a+3x) + (−2y−5z), then expand",s:["= (2a+3x)² + 2(2a+3x)(−2y−5z) + (−2y−5z)²","= 4a²+12ax+9x²−8ay−20az−12xy−30xz+4y²+20yz+25z²"],a:"4a²+9x²+4y²+25z²+12ax−8ay−20az−12xy−30xz+20yz"}
    ]},
    {num:"03",title:"Mental Math Squares",concept:"Sometimes a number is close to a round number like 1000. Rewrite it and use a square formula to calculate fast — no long multiplication needed!",
    formulas:["(a + b)² = a² + 2ab + b²","(a − b)² = a² − 2ab + b²"],meanings:["For numbers just above a round number","For numbers just below a round number"],
    vis:"mental",
    ex:{q:"Find 102² quickly",steps:["102 = 100 + 2","(102)² = (100+2)² = 100² + 2×100×2 + 2²","= 10000 + 400 + 4","= 10404"],ans:"10,404"},
    qs:[
      {q:"Find (996)² using identity.",h:"996 = 1000 − 4, use (a−b)²",s:["(996)² = (1000−4)² = 1000² − 2×1000×4 + 4²","= 1000000 − 8000 + 16","= 992016"],a:"992,016"},
      {q:"Find (1007)².",h:"1007 = 1000 + 7, use (a+b)²",s:["(1007)² = (1000+7)² = 1000² + 2×1000×7 + 7²","= 1000000 + 14000 + 49","= 1014049"],a:"1,014,049"}
    ]},
    {num:"04",title:"Simplification by Substitution",concept:"If a long expression matches a known identity pattern, replace parts with simple letters. Then the identity does all the heavy lifting for you!",
    formulas:["a² + 2ab + b² = (a+b)²","a² − 2ab + b² = (a−b)²","a² − b² = (a+b)(a−b)"],meanings:["Recognize the pattern, substitute","Same pattern with minus in middle","Difference of squares identity"],
    vis:"substitution",
    ex:{q:"Simplify p² + 2pq + q²",steps:["Recognize: this matches a² + 2ab + b²","Where a = p, b = q","∴ p² + 2pq + q² = (p + q)²"],ans:"(p + q)²"},
    qs:[
      {q:"(5x+7y+3z)² + 2(7x−7y−3z)(5x+7y+3z) + (7x−7y−3z)²?",h:"Spot the pattern a² + 2ab + b²",s:["Let a = 5x+7y+3z, b = 7x−7y−3z","= a² + 2ba + b² = (a+b)²","= (5x+7y+3z + 7x−7y−3z)² = (12x)²","= 144x²"],a:"144x²"},
      {q:"(7p+3q−5r)² − 2(7p+3q−5r)(8p−4q−5r) + (8p−4q−5r)²?",h:"This matches a² − 2ab + b² = (a−b)²",s:["Let a = 7p+3q−5r, b = 8p−4q−5r","= (a−b)² = (7p+3q−5r − 8p+4q+5r)²","= (−p+7q)² = (7q−p)²"],a:"(7q − p)²"},
      {q:"Compute: 6.35×6.35 + 2×6.35×3.65 + 3.65×3.65",h:"Recognize a² + 2ab + b² with a=6.35, b=3.65",s:["= (6.35)² + 2×6.35×3.65 + (3.65)²","= (6.35 + 3.65)² = (10)²","= 100"],a:"100"},
      {q:"(2345² − 759²) ÷ (2345 − 759) = ?",h:"Use a² − b² = (a+b)(a−b)",s:["= (2345+759)(2345−759) ÷ (2345−759)","= 2345 + 759","= 3104"],a:"3104"}
    ]},
    {num:"05",title:"Finding Values Using Corollaries",concept:"If some values are given, we can use identities to find unknown expressions without solving for each variable separately.",
    formulas:["(a+b)² = (a−b)² + 4ab","(a−b)² = (a+b)² − 4ab"],meanings:["Find (a+b) when (a−b) and ab are given","Find (a−b) when (a+b) and ab are given"],
    vis:"corollary",
    ex:{q:"If a − b = 1 and ab = 2, find (a + b)²",steps:["(a+b)² = (a−b)² + 4ab","= 1² + 4×2","= 1 + 8 = 9"],ans:"9"},
    qs:[
      {q:"If x − y = 2 and xy = 24, find (x + y).",h:"Use (x+y)² = (x−y)² + 4xy",s:["(x+y)² = (x−y)² + 4xy = 4 + 96 = 100","x + y = ±√100 = ±10"],a:"±10"},
      {q:"If a − b = 4 and ab = 60, find (a + b).",h:"Use (a+b)² = (a−b)² + 4ab",s:["(a+b)² = 16 + 240 = 256","a + b = ±√256 = ±16"],a:"±16"},
      {q:"If a + b = 9m and ab = 18m², find (a − b).",h:"Use (a−b)² = (a+b)² − 4ab",s:["(a−b)² = (9m)² − 4×18m² = 81m² − 72m² = 9m²","a − b = ±3m"],a:"±3m"}
    ]},
    {num:"06",title:"Repeated Squaring",concept:"Sometimes one identity leads to another. We square once, simplify, and square again to reach a higher power expression.",
    formulas:["(a ± b)² twice gives a⁴ + 1/a⁴"],meanings:["Square once → a² + 1/a². Square again → a⁴ + 1/a⁴"],
    vis:"repeated",
    ex:{q:"If t + 1/t = 3, find t² + 1/t²",steps:["Square both sides: (t + 1/t)² = 9","t² + 2×t×(1/t) + 1/t² = 9","t² + 2 + 1/t² = 9","t² + 1/t² = 7"],ans:"7"},
    qs:[

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let curChapter=null, cur=0, stepTimers=[];

function openChapter(ci){
  curChapter=ci; cur=0;
  document.getElementById('home').style.display='none';
  const ls=document.getElementById('lesson');
  ls.style.display='flex'; ls.style.flexDirection='column';
  buildAll();
  showLesson(0);
}

function goHome(){
  document.getElementById('lesson').style.display='none';
  document.getElementById('home').style.display='flex';
  curChapter=null;
}

// ─────────────────────────────────────────────
//  RENDER CHIPS + DOTS
// ─────────────────────────────────────────────
function renderChips(){
  const ch=CHAPTERS[curChapter];
  const row=document.getElementById('chipRow');
  row.innerHTML=`<button class="back-btn" onclick="goHome()">←</button>`
    +ch.chips.map((c,i)=>`<div class="fchip${cur===i?' on':''}">${c}</div>`).join('');
}
function renderDots(){
  const ch=CHAPTERS[curChapter];
  const total=ch.lessons.length;
  document.getElementById('dotRow').innerHTML=
    ch.lessons.map((_,i)=>`<button class="pdot${i===cur?' active':i<cur?' done':''}" style="width:${i===cur?24:9}px" onclick="go(${i})" title="${ch.lessons[i].title}"></button>`).join('')
    +`<button class="pdot sum${cur===total?' active':cur>total-1?' done':''}" style="width:${cur===total?24:9}px" onclick="go(${total})" title="Summary"></button>`;
}

// ─────────────────────────────────────────────
//  BUILD CARDS
// ─────────────────────────────────────────────
function buildAll(){
  const ch=CHAPTERS[curChapter];
  const lc=document.getElementById('lessonContent');
  lc.innerHTML='';
  ch.lessons.forEach((l,i)=>lc.appendChild(buildCard(l,i)));
  lc.appendChild(buildSummary(ch));
}

function buildCard(l,i){
  const d=document.createElement('div');
  d.className='card'; d.id=`c-${i}`;
  const fboxes=l.formulas.map((f,fi)=>`<div class="fbox fbox-${fi%5}"><div class="flbl">Formula${l.formulas.length>1?' '+(fi+1):''}</div><div class="ftext">${f}</div><div class="fmean">${l.meanings[fi]||''}</div></div>`).join('');
  const steps=l.ex.steps.map((s,si)=>`<div class="step" id="s-${i}-${si}"><div class="sarr">${si===0?'→':'='}</div><div class="stxt">${s}</div></div>`).join('');
  const qs=l.qs.map((q,qi)=>`<div class="qi" id="qi-${i}-${qi}"><button class="qh" onclick="toggleQ(${i},${qi})"><div class="qn">Q${qi+1}</div><div class="qtxt">${q.q}</div><div class="qtog">▾</div></button><div class="qb"><div class="qb-inner"><div class="qhint"><strong>Hint:</strong> ${q.h}</div>${q.s.map((st,si)=>`<div class="qstep"><div class="qsn">${si+1}.</div><div class="qst">${st}</div></div>`).join('')}<div class="qans">✓ ${q.a}</div></div></div></div>`).join('');
  const ch=CHAPTERS[curChapter];
  d.innerHTML=`
    <div class="lhdr"><div class="lnum">${l.num}</div><div><div class="ltitle">${l.title}</div><div class="lconcept">${l.concept}</div></div></div>
    ${fboxes}
    <div class="vis">${VISUALS[l.vis]||''}</div>
    <div class="ex-box"><div class="ex-lbl">Worked Example</div><div class="ex-q">${l.ex.q}</div>${steps}<div class="step" id="s-${i}-ans"><div class="sarr"></div><div><span class="abadge">✓ ${l.ex.ans}</span></div></div></div>
    <div class="qlbl">Practice Questions (${l.qs.length})</div>
    ${qs}
    <div class="nav">
      <button class="nbtn" onclick="go(${i-1})" ${i===0?'disabled':''}>← Previous</button>
      <button class="nbtn pri" onclick="go(${i+1})">${i===ch.lessons.length-1?'Summary →':'Next Lesson →'}</button>
    </div>`;
  return d;
}

function buildSummary(ch){
  const d=document.createElement('div');
  d.className='card'; d.id=`c-${ch.lessons.length}`;
  d.innerHTML=`<div class="sum">
    <div class="sum-ico">✓</div>
    <h2>${ch.tag} Complete!</h2>
    <p>${ch.title}</p>
    <div class="fgrid">${ch.summary.map(s=>`<div class="fsc"><div class="fn">${s.n}</div><div class="ff">${s.f}</div></div>`).join('')}</div>
    <div class="sum-nav">
      <button class="nbtn" onclick="go(${ch.lessons.length-1})">← Review Last Lesson</button>
      <button class="nbtn pri" onclick="go(0)">↩ Start Over</button>
      <button class="nbtn" style="background:#E1F5EE;border-color:#5DCAA5;color:#085041" onclick="goHome()">← Chapters</button>
    </div>
  </div>`;
  return d;
}

// ─────────────────────────────────────────────
//  ANIMATE STEPS
// ─────────────────────────────────────────────
function animSteps(idx){
  stepTimers.forEach(clearTimeout); stepTimers=[];
  const l=CHAPTERS[curChapter].lessons[idx];
  if(!l) return;
  const total=l.ex.steps.length+1;
  for(let i=0;i<total;i++){
    const id=i<l.ex.steps.length?`s-${idx}-${i}`:`s-${idx}-ans`;
    stepTimers.push(setTimeout(()=>{const e=document.getElementById(id);if(e)e.classList.add('vis2');},i*380));
  }
}

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function showLesson(idx){
  const ch=CHAPTERS[curChapter];
  document.querySelectorAll('.card').forEach((c,i)=>c.classList.toggle('active',i===idx));
  cur=idx; renderChips(); renderDots();
  if(idx<ch.lessons.length) animSteps(idx);
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(idx){
  const max=CHAPTERS[curChapter].lessons.length;
  if(idx<0||idx>max) return;
  showLesson(idx);
}
function toggleQ(li,qi){
  document.getElementById(`qi-${li}-${qi}`).classList.toggle('open');
}
</script>
</body>
</html>
